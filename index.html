<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>godmhoiz</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #edf1f5;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: white;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
      z-index: 10;
    }

    .sidebar h2 {
      margin-top: 0;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      font-size: 16px;
    }

    input {
      border: 1px solid #ccc;
    }

    button {
      border: none;
      color: white;
      cursor: pointer;
    }

    .save {
      background: #4f8cff;
    }

    .main {
      flex: 1;
      padding: 20px;
      overflow: auto;
    }

    .room {
      width: 1200px;
      height: 800px;
      background: white;
      border: 4px solid #333;
      border-radius: 16px;
      position: relative;
      margin: auto;
      touch-action: none;
    }

    .board {
      position: absolute;
      top: 25px;
      left: 250px;
      width: 700px;
      height: 70px;
      background: #222;
      color: white;
      text-align: center;
      line-height: 70px;
      border-radius: 12px;
      font-size: 26px;
      font-weight: bold;
    }

    .desk {
      width: 90px;
      height: 60px;
      background: #4f8cff;
      color: white;
      border-radius: 12px;
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      user-select: none;
      cursor: grab;
      touch-action: none;
      font-size: 14px;
    }

    .desk-name {
      font-size: 12px;
      color: #ffe600;
      margin-top: 3px;
      max-width: 80px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .selected {
      outline: 4px solid #ffcc00;
    }

    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .main {
        padding: 10px;
      }
    }
  </style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h2>ระบบจองโต๊ะ</h2>

    <p id="selectedText">ยังไม่ได้เลือกโต๊ะ</p>

    <input type="text" id="nameInput" placeholder="กรอกชื่อ">

    <button class="save" onclick="saveName()">บันทึกชื่อ</button>
  </div>

  <div class="main">
    <div class="room" id="room">
      <div class="board">กระดาน</div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

  import {
    getDatabase,
    ref,
    set,
    onValue
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQpnPJQgbBGmtZrm-9KcfqFBkznnHG3SY",
    authDomain: "godmhoiz.firebaseapp.com",
    databaseURL: "https://godmhoiz-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "godmhoiz",
    storageBucket: "godmhoiz.firebasestorage.app",
    messagingSenderId: "898201579256",
    appId: "1:898201579256:web:b99e5bfce7a315a046d50d",
    measurementId: "G-9QFTCLZJBL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const room = document.getElementById("room");
  const selectedText = document.getElementById("selectedText");
  const nameInput = document.getElementById("nameInput");

  let currentDesk = null;
  let draggingDesk = null;
  let offsetX = 0;
  let offsetY = 0;

  for (let i = 1; i <= 30; i++) {
    createDesk(i);
  }

  loadRealtimeData();

  function createDesk(number) {
    const desk = document.createElement("div");

    desk.className = "desk";
    desk.dataset.number = number;

    desk.innerHTML = `
      <div>โต๊ะ ${number}</div>
      <div class="desk-name">ว่าง</div>
    `;

    const col = (number - 1) % 6;
    const row = Math.floor((number - 1) / 6);

    desk.style.left = (120 + col * 160) + "px";
    desk.style.top = (140 + row * 110) + "px";

    desk.addEventListener("pointerdown", startDrag);

    room.appendChild(desk);
  }

  function loadRealtimeData() {
    const desksRef = ref(db, "classroom/desks");

    onValue(desksRef, (snapshot) => {
      const data = snapshot.val();

      if (!data) return;

      Object.keys(data).forEach(number => {
        const desk = document.querySelector(`.desk[data-number="${number}"]`);

        if (!desk) return;

        if (data[number].x !== undefined) {
          desk.style.left = data[number].x + "px";
        }

        if (data[number].y !== undefined) {
          desk.style.top = data[number].y + "px";
        }

        if (data[number].name) {
          desk.querySelector(".desk-name").innerText = data[number].name;
        } else {
          desk.querySelector(".desk-name").innerText = "ว่าง";
        }
      });
    });
  }

  function selectDesk(desk) {
    document.querySelectorAll(".desk").forEach(d => {
      d.classList.remove("selected");
    });

    desk.classList.add("selected");
    currentDesk = desk;

    const number = desk.dataset.number;
    const currentName = desk.querySelector(".desk-name").innerText;

    selectedText.innerText = `เลือกโต๊ะ ${number}`;
    nameInput.value = currentName === "ว่าง" ? "" : currentName;
  }

  function startDrag(e) {
    draggingDesk = e.currentTarget;

    selectDesk(draggingDesk);

    const rect = draggingDesk.getBoundingClientRect();

    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    draggingDesk.setPointerCapture(e.pointerId);

    draggingDesk.addEventListener("pointermove", drag);
    draggingDesk.addEventListener("pointerup", stopDrag);
  }

  function drag(e) {
    if (!draggingDesk) return;

    const roomRect = room.getBoundingClientRect();

    let x = e.clientX - roomRect.left - offsetX;
    let y = e.clientY - roomRect.top - offsetY;

    x = Math.max(0, Math.min(x, room.clientWidth - draggingDesk.clientWidth));
    y = Math.max(0, Math.min(y, room.clientHeight - draggingDesk.clientHeight));

    draggingDesk.style.left = x + "px";
    draggingDesk.style.top = y + "px";
  }

  function stopDrag() {
    if (!draggingDesk) return;

    const number = draggingDesk.dataset.number;
    const name = draggingDesk.querySelector(".desk-name").innerText;

    set(ref(db, `classroom/desks/${number}`), {
      x: parseInt(draggingDesk.style.left),
      y: parseInt(draggingDesk.style.top),
      name: name === "ว่าง" ? "" : name
    });

    draggingDesk.removeEventListener("pointermove", drag);
    draggingDesk.removeEventListener("pointerup", stopDrag);

    draggingDesk = null;
  }

  window.saveName = function() {
    if (!currentDesk) {
      alert("กรุณาเลือกโต๊ะก่อน");
      return;
    }

    const number = currentDesk.dataset.number;
    const name = nameInput.value.trim();

    if (name === "") {
      alert("กรุณากรอกชื่อ");
      return;
    }

    set(ref(db, `classroom/desks/${number}`), {
      x: parseInt(currentDesk.style.left),
      y: parseInt(currentDesk.style.top),
      name: name
    });
  }
</script>

</body>
</html>
